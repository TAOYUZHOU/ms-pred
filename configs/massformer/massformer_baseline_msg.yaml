launcher_args: {experiment_name: massformer_baseline_msg,
  script_name: "src/ms_pred/massformer_pred/train.py",
  slurm_script: launcher_scripts/generic_slurm.sh, 
  launch_method: local,
  visible_devices: [0]
}
universal_args:
  _slurm_args:
  - {_num_gpu: 1, cpus-per-task: 7, job-name: forward_train, mem-per-cpu: 8G,
    time: '1-18:00:00'}
  debug: [false]
  gpu: [True]

  seed: [1]
  num-workers: [8]
  batch-size: [128]
  max-epochs: [100]
  patience: [30]

  dataset-name: [msg]

  learning-rate: [0.00014]
  lr-decay-rate: [0.853]
  num-bins: [15000]
  loss-fn: [cosine]

  use-reverse: [true]

  gf-fix-num-pt-layers: [0]
  gf-reinit-num-pt-layers: [-1]
  gf-reinit-layernorm: [True]
  gf-model-name: [graphormer_base]
  gf-pretrain-name: [pcqm4mv2_graphormer_base]

  mf-num-ff-num-layers: [1]
  mf-ff-h-dim: [1024]
  mf-dropout: [0.1]

  mf-ff-skip: [true]
  mf-layer-type: [neims]

  weight-decay: [1e-7]

  form-dir-name: ['no_subform.hdf5']
  embed-adduct: [true]
  embed-collision-energy: [true]

iterative_args:
  -  split-name: [split.tsv]
     save-dir: [split_rnd1]
     seed: [1]
