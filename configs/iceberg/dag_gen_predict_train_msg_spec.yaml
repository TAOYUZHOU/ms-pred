launcher_args: {experiment_name: dag_gen_msg_spec,
  script_name: "src/ms_pred/dag_pred/predict_gen.py",
  slurm_script: launcher_scripts/generic_slurm.sh, 
  launch_method: local,
  visible_devices: [0,1,2,5,6,7],
}
universal_args:
  _slurm_args:
  - {_num_gpu: 1, cpus-per-task: 7, job-name: forward_train, mem-per-cpu: 8G, 
    nodelist: 'node[1236]', time: '1-18:00:00'}
  debug: [false]
  gpu: [true]

  batch-size: [12]
  dataset-name: [msg]
  dataset-labels: [labels.tsv]
  num-workers: [12]
  threshold: [0.0]
  max-nodes: [100]
  num-decoys: [10] # predict target structures + 10 decoys
  # pubchem-map-path: [data/pubchem/pubchem_formulae_inchikey.hdf5]

iterative_args:
  -  split-name: [split.tsv]
     checkpoint-pth: [results/dag_gen_msg_spec/split_rnd1/version_0/best.ckpt]
     save-dir: [results/dag_gen_msg_spec/split_rnd1/preds_train_100]

  -  split-name: [split.tsv]
     checkpoint-pth: [results/dag_gen_msg_spec/split_rnd2/version_0/best.ckpt]
     save-dir: [results/dag_gen_msg_spec/split_rnd2/preds_train_100]

  -  split-name: [split.tsv]
     checkpoint-pth: [results/dag_gen_msg_spec/split_rnd3/version_0/best.ckpt]
     save-dir: [results/dag_gen_msg_spec/split_rnd3/preds_train_100]


